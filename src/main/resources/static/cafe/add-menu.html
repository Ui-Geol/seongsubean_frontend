<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메뉴 추가/수정</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <link rel="stylesheet" href="/cafe/add-menu.css"/>
  <link rel="stylesheet" href="/common/header.css"/>
  <link rel="stylesheet" href="/common/footer.css"/>
</head>
<body>
<div id="header-container"></div>

<div class="add-menu-container">
  <div class="form-wrapper">
    <h1 class="form-title" id="pageTitle">메뉴 추가</h1>

    <div class="menu-form">
      <div class="form-group">
        <label for="menuCategory">메뉴 카테고리</label>
        <select id="menuCategory" required>
          <option value="">카테고리 선택</option>
          <option value="커피">커피</option>
          <option value="음료">음료</option>
          <option value="디저트">디저트</option>
          <option value="베이커리">베이커리</option>
          <option value="샐러드">샐러드</option>
          <option value="샌드위치">샌드위치</option>
        </select>
      </div>

      <!-- cafeId는 JavaScript에서 URL 파라미터로 처리 -->
      <input type="hidden" id="cafeId">
      <input type="hidden" id="menuId">

      <div class="form-group">
        <label for="menuName">메뉴명</label>
        <input type="text" id="menuName" placeholder="메뉴를 입력해주세요" required>
      </div>

      <div class="form-group">
        <label for="menuDescription">메뉴소개</label>
        <textarea id="menuDescription" placeholder="최대 300자" maxlength="300"></textarea>
        <div class="char-count">
          <span id="charCount">0</span>/300
        </div>
      </div>

      <div class="form-group">
        <label for="price">가격</label>
        <input type="number" id="price" placeholder="가격을 입력해주세요" min="0" step="100" required>
      </div>

      <div class="form-group">
        <div class="image-upload" id="imageUpload">
          <div class="upload-content">
            <div class="upload-icon">📷</div>
            <span class="upload-text">사진 추가</span>
          </div>
          <input type="file" id="imageInput" accept="image/*" style="display: none;">
        </div>
        <div id="imagePreview" class="image-preview"></div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-cancel" id="cancelBtn">취소</button>
        <button type="button" class="btn btn-submit" id="submitBtn">등록</button>
      </div>
    </div>
  </div>
</div>

<div id="footer-container"></div>

<script type="module" src="/cafe/add-menu.js"></script>
<script type="module" src="/common/common.js"></script>
</body>
</html>
