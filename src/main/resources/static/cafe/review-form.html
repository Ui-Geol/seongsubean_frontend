<!DOCTYPE html>
<html lang="ko">
<head>
  <title>리뷰 작성</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="review-form.css">
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
<div class="review-container">
  <div class="review-form">
    <!-- Header -->
    <div class="review-header">
      <h1>리뷰작성</h1>
    </div>

    <!-- Review Form -->
    <div id="reviewForm">
      <!-- Star Rating -->
      <div class="rating-section">
        <div class="rating-label">별점을 선택해주세요</div>
        <div class="rating-input">
          <input type="radio" name="rating" value="1" id="star1" class="star-input">
          <label for="star1" class="star-label">★</label>

          <input type="radio" name="rating" value="2" id="star2" class="star-input">
          <label for="star2" class="star-label">★</label>

          <input type="radio" name="rating" value="3" id="star3" class="star-input">
          <label for="star3" class="star-label">★</label>

          <input type="radio" name="rating" value="4" id="star4" class="star-input">
          <label for="star4" class="star-label">★</label>

          <input type="radio" name="rating" value="5" id="star5" class="star-input">
          <label for="star5" class="star-label">★</label>
        </div>
      </div>

      <!-- Review Text Area -->
      <div class="review-input">
        <textarea
            name="content"
            id="reviewContent"
            placeholder="리뷰를 작성해주세요. (최대 500자)"
            maxlength="500"
            required></textarea>
        <div class="char-count">
          <span id="charCount">0</span>/500
        </div>
      </div>

      <!-- Image Upload Section -->
      <div class="image-upload" id="imageUpload">
        <input type="file" id="imageInput" multiple accept="image/*" style="display: none;">
        <div class="upload-area" onclick="document.getElementById('imageInput').click();">
          <div class="upload-icon">📷</div>
          <span>사진 추가 (선택사항)</span>
        </div>
        <div class="image-preview" id="imagePreview"></div>
      </div>

      <!-- Action Buttons -->
      <div class="button-group">
        <button type="button" class="btn btn-cancel" onclick="cancelReview()">취소</button>
        <button type="button" class="btn btn-submit" onclick="submitReview()">등록</button>
      </div>
    </div>
  </div>
</div>

<script type="module" src="review-form.js"></script>
</body>
</html>
