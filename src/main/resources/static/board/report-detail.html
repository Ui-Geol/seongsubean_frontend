<!DOCTYPE html>
<html lang="ko">
<head>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <meta charset="UTF-8">
  <title>제보게시글 상세 - SeongsuBean</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="/board/detail.css" />
  <link rel="stylesheet" href="/common/header.css">
  <link rel="stylesheet" href="/common/footer.css">
</head>
<body>
<div id="header-container"></div>
<div class="container">
  <article class="post-container">
    <div class="post-header">
      <h1 class="post-title" id="post-title"></h1>
      <div class="post-meta">
        <div class="author-info">
          <div class="author-avatar" id="author-avatar"></div>
          <div class="author-details">
            <span class="author-name" id="author-name"></span>
            <span class="post-date" id="post-date"></span>
          </div>
        </div>
        <div class="post-actions">
          <button class="action-btn delete-btn" id="delete-btn" style="display: none">삭제하기</button>
          <button class="action-btn edit-btn" id="edit-btn" style="display: none">수정하기</button>
        </div>
      </div>
    </div>

    <div class="post-content">
      <div id="image-container" class="image-wrapper"></div>
      <div class="post-text" id="post-content"></div>
    </div>
  </article>
</div>
<div id="footer-container"></div>
<script type="module" src="/board/report-detail.js"></script>
</body>
</html>
