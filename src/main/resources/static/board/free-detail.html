<!DOCTYPE html>
<html lang="ko">
<head>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <meta charset="UTF-8">
    <title>자유게시글 상세 - SeongsuBean</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="/board/detail.css" />
    <link rel="stylesheet" href="/common/header.css">
    <link rel="stylesheet" href="/common/footer.css">
</head>
<body>
<div id="header-container"></div>
<div class="container">
    <div class="headword-container">
        <select id="headword-select" disabled>
            <option value="자유::리뷰">자유::리뷰</option>
            <option value="자유::정보">자유::정보</option>
        </select>
    </div>

    <article class="post-container">
        <div class="post-header">
            <h1 class="post-title" id="post-title"></h1>
            <div class="post-meta">
                <div class="author-info">
                    <div class="author-avatar" id="author-avatar"></div>
                    <div class="author-details">
                        <span class="author-name" id="author-name"></span>
                        <span class="post-date" id="post-date"></span>
                    </div>
                </div>
                <div class="post-actions">
                    <button class="action-btn delete-btn" id="delete-btn" style="display: none">삭제하기</button>
                    <button class="action-btn edit-btn" id="edit-btn" style="display: none">수정하기</button>
                </div>
            </div>
        </div>

        <div class="post-content">
            <div id="image-container" class="image-wrapper"></div>
            <div id="post-content" class="post-text"></div>
        </div>
    </article>

    <section class="comment-section">
        <div class="comment-form">
            <div class="comment-avatar"></div>
            <div class="comment-input-container">
                <textarea class="comment-input" placeholder="댓글을 작성하세요"></textarea>
                <button class="comment-submit">등록</button>
            </div>
        </div>
        <div class="comment-list"></div>
    </section>
</div>
<div id="footer-container"></div>
<script type="module" src="/board/free-detail.js"></script>
</body>
</html>
