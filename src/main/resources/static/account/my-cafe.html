<!DOCTYPE html>
<html lang="ko">
<head>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seongsu Bean - 내 카페</title>
  <link rel="stylesheet" href="my-cafe.css"/>
</head>
<body>
<!-- 메인 콘텐츠 -->
<div class="main-content">
  <div class="container">
    <div class="row">
      <div class="col-12">
        <h1 class="page-title"></h1>
        <!-- 카페 그리드 -->
        <!-- 카페 카드 그리드 -->
        <div class="cafe-grid row row-cols-1 row-cols-md-3 g-4">
          <div class="col">
            <a class="text-decoration-none text-dark">
              <div class="cafe-card card h-100">
                <img
                    src="/images/common/logo.png"
                    class="card-img-top cafe-image" alt="카페 이미지">
                <div class="card-body cafe-info">
                  <h5 class="card-title cafe-name"></h5>
                  <p class="card-text cafe-address"></p>
                  <div class="cafe-rating">
                    <span class="rating-score"></span>
                    <div class="stars">
                      <i class="bi bi-star-fill"></i>
                      <i class="bi bi-star"></i>
                    </div>
                    <span class="review-count"></span>
                  </div>
                </div>
              </div>
            </a>
          </div>
        </div>
        <!-- 페이지네이션 -->
        <div class="pagination-container text-center">
          <nav aria-label="Page navigation">
            <ul class="pagination justify-content-center">
              <li class="page-item">
                <a class="page-link" aria-label="Previous">
                  <span aria-hidden="true">&laquo;</span>
                </a>
              </li>
              <li class="page-item">
                <a class="page-link">1</a>
              </li>
              <li class="page-item">
                <a class="page-link" aria-label="Next">
                  <span aria-hidden="true">&raquo;</span>
                </a>
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
